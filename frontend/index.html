<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyMods</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header d-flex align-items-center justify-content-between">
        <span><!-- <img src="" alt="Logo.пнг"> --></span>
        <div class="header-actions d-flex gap-2">
            <a class="btn btn-secondary" href="/login">Войти</a>
            <a class="btn btn-primary" href="/registration">Зарегистрироваться</a>
        </div>
    </header>

    <main class="layout">
        <aside class="sidebar">
            <div class="sidebar-title">Фильтры</div>

            <div class="filter-group">
                <label for="searchInput" class="filter-label">Поиск по названию</label>
                <input type="text" id="searchInput" class="filter-input form-control form-control-sm" placeholder="Например, minimap">
            </div>

            <div class="filter-group">
                <label for="versionSelect" class="filter-label">Версия:</label>
                <select id="versionSelect" class="filter-select form-select form-select-sm">
                    <option value="">Любая</option>
                    <option value="1.21.1">1.21.1</option>
                    <option value="1.20.1">1.20.1</option>
                    <option value="1.16.5">1.16.5</option>
                    <option value="1.12.2">1.12.2</option>
                </select>
            </div>

            <div class="filter-group">
                <span for="" class="filter-label">Категории:</span>
                <div class="filter-checkboxes">
                    <label class="form-check">
                        <input type="checkbox" class="form-check-input" name="category" value="Технические">
                        Технические
                    </label>
                    <label class="form-check">
                        <input type="checkbox" class="form-check-input" name="category" value="Мир">
                        Мир
                    </label>
                    <label class="form-check">
                        <input type="checkbox" class="form-check-input" name="category" value="Интерфейс">
                        Интерфейс
                    </label>
                    <label class="form-check">
                        <input type="checkbox" class="form-check-input" name="category" value="Геймплей">
                        Геймплей
                    </label>
                </div>
            </div>

            <div class="filter-buttons">
                <a id="applyFilters" class="btn btn-small btn-primary" href="">Применить</a>
                <a id="resetFilters" class="btn btn-small btn-secondary" href="">Сбросить</a>
            </div>
        </aside>

        <section class="content">
            <div class="content-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                <div>
                    <h1 class="content-title">Каталог модов</h1>
                </div>
                <div id="totalCount" class="content-subtitle text-md-end"></div>
            </div>

            <div id="cardsContainer" class="cards"></div>

            <div class="pagination">
                <button id="prevPage" class="page-btn btn btn-outline-secondary btn-sm" type="button">&laquo;</button>
                <div id="pageNumbers" class="d-flex gap-1">0</div>
                <button id="nextPage" class="page-btn btn btn-outline-secondary btn-sm" type="button">&raquo;</button>
                <span id="pageInfo" class="page-info"></span>
            </div>
        </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
