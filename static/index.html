<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyMods</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="static/css/styles.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- <header class="header d-flex align-items-center justify-content-between">
        <span><img src="" alt="Logo.пнг"></span>
        <div>

        </div>
        <div class="header-actions d-flex gap-2">
            <a class="btn btn-secondary" href="/login">Войти</a>
            <a class="btn btn-primary" href="/register">Зарегистрироваться</a>
        </div>
    </header> -->

    <main class="layout">
        <!-- FILTERS -->
        <aside class="sidebar">
            <div class="sidebar-title">Фильтры</div>

            <form id="filtersForm" class="filters-form">
                <div class="filter-group">
                    <label for="searchInput" class="filter-label">Поиск по названию</label>
                    <input type="text" id="searchInput" name="title" class="filter-input form-control form-control-sm" placeholder="Например, minimap">
                </div>

                <div class="filter-group">
                    <label for="versionSelect" class="filter-label">Версия:</label>
                    <select id="versionSelect" name="version_id" class="filter-select form-select form-select-sm">
                        <option value="">Любая</option>
                    </select>
                </div>

                <fieldset class="filter-group">
                    <legend class="filter-label">Категории:</legend>
                    <div class="filter-checkboxes">
                    </div>
                </fieldset>

                <div class="filter-buttons">
                    <button id="applyFilters" class="btn btn-small btn-primary" type="submit">Применить</button>
                    <button id="resetFilters" class="btn btn-small btn-secondary" type="reset">Сбросить</button>
                </div>
            </form>
        </aside>

        <!-- MOD CONTAINER -->
        <section class="content">
            <div class="content-header d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-2">
                <div>
                    <h1 class="content-title">Каталог модов</h1>
                </div>
                <div id="totalCount" class="content-subtitle text-md-end"></div>
            </div>

            <div id="cardsContainer" class="cards">
                <div id="mods-loading" class="text-center py-4 muted" style="grid-column: span 3;">
                    Загрузка...
                </div>
            </div>

            <div class="pagination">
                <button id="prevPage" class="page-btn btn btn-outline-secondary btn-sm" type="button">&laquo;</button>
                <div id="pageNumbers" class="d-flex gap-1">0</div>
                <button id="nextPage" class="page-btn btn btn-outline-secondary btn-sm" type="button">&raquo;</button>
                <span id="pageInfo" class="page-info"></span>
            </div>
        </section>

        <!-- ADDITIONAL BUTTONS -->
        <section class="additional-buttons">
            <button type="button" class="btn btn-small btn-primary" upload-mod-tooltip="Загрузить мод">+</button>
            <!-- <div class="upload-mod">
            </div> -->
        </section>
    </main>

    <!-- MODAL WINDOW FOR VIEW DETAIL INFO FOR MOD -->
    <div class="modal fade" id="modDetailsModal" tabindex="-1" aria-labelledby="modDetailsTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl mod-details-dialog">
            <div class="modal-content mod-details-content">
                <div class="modal-header border-0 pb-0">
                    <h2 id="modDetailsTitle" class="modal-title mod-details-title"></h2>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body pt-2">
                    <section class="mod-details-section">
                        <h3 class="mod-details-section-title">Описание</h3>
                        <p id="modDetailsDescription" class="mod-details-description"></p>
                    </section>
                    <section class="mod-details-section">
                        <h3 class="mod-details-section-title">Скачать по версиям</h3>
                        <div id="modDetailsDownloads" class="mod-download-links"></div>
                    </section>
                    <section class="mod-details-section">
                        <h3 class="mod-details-section-title">Добавить файл</h3>
                        <button type="button" id="openModUploadFromDetailsBtn" class="btn btn-small btn-primary">
                            Загрузить для другой версии
                        </button>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL WINDOW FOR UPLOAD MOD -->
    <div class="modal fade" id="modUploadModal" tabindex="-1" aria-labelledby="modUploadTitle" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm mod-details-dialog">
            <div class="modal-content mod-details-content">
                <div class="modal-header border-0 pb-0">
                    <h2 id="modUploadTitle" class="modal-title mod-details-title">Публикация мода</h2>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body pt-2">
                    <section class="mod-details-section" id="modUploadNameSection">
                        <h3 class="mod-details-section-title">Название</h3>
                        <input type="text" id="modUploadNameInput" class="filter-input form-control form-control-sm" />
                    </section>
                    <section class="mod-details-section" id="modUploadDescriptionSection">
                        <h3 class="mod-details-section-title">Описание</h3>
                        <textarea id="modUploadDescriptionInput" class="filter-input form-control form-control-sm"></textarea>
                    </section>
                    <section class="mod-details-section">
                        <h3 class="mod-details-section-title">Версия</h3>
                        <select id="modUploadVersionSelect" class="filter-select form-select form-select-sm">
                            <option value="">Выберите версию</option>
                        </select>
                    </section>
                    <section class="mod-details-section" id="modUploadCategoriesSection">
                        <h3 class="mod-details-section-title">Категории</h3>
                        <div id="modUploadCategoryCheckboxes" class="filter-checkboxes"></div>
                    </section>
                    <section class="mod-details-section">
                        <h3 class="mod-details-section-title">Файл мода (.jar)</h3>
                        <input type="file" id="modUploadFileInput" accept=".jar" class="form-control form-control-sm" />
                        <p id="modUploadError" class="text-danger small mb-2"></p>
                        <button type="button" id="modUploadSubmitBtn" class="btn btn-small btn-primary">
                            Опубликовать
                        </button>
                    </section>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script type="module" src="static/js/script.js"></script>
    <script type="module" src="js/script.js"></script>
</body>
</html>
